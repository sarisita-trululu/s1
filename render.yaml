services:
  - type: web
    name: nuby-arango-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////tmp/nuby.db
      - key: CORS_ORIGINS
        value: https://tu-frontend.com
      - key: UPLOAD_DIR
        value: /tmp/uploads
