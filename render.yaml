services:
  - type: web
    name: organizador-entregas
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_DATA_DIR
        value: /tmp/organizador-data
